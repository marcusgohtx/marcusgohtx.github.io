name: Build and Deploy to gh-pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: "gh-pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        env:
          GITHUB_ACTIONS: "true"
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npm run build

      - name: Ensure .nojekyll
        run: touch out/.nojekyll

      - name: Prepare deploy branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          REPO_URL="https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          mkdir .deploy
          if git ls-remote --exit-code --heads "$REPO_URL" gh-pages; then
            git clone --depth 1 --branch gh-pages "$REPO_URL" .deploy
          else
            git clone --depth 1 "$REPO_URL" .deploy
            cd .deploy
            git checkout --orphan gh-pages
            git rm -rf . >/dev/null 2>&1 || true
            cd ..
          fi

      - name: Publish site to gh-pages
        run: |
          rsync -av --delete --exclude ".git" out/ .deploy/
          cd .deploy
          touch .nojekyll
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to publish."
          else
            git commit -m "Deploy ${GITHUB_SHA}"
            git push origin gh-pages
          fi
